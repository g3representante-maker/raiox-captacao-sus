<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>Raio-X de Captação SUS — G3 Health Service</title>
<style>html,body{height:100%;margin:0}body{font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;color:#1a5276;background:#f0f2f5}
.sp{width:34px;height:34px;border:4px solid #d6e4ef;border-top-color:#1a5276;border-radius:50%;animation:r 1s linear infinite}@keyframes r{to{transform:rotate(360deg)}}</style>
</head><body>
<div class="sp"></div><div>Carregando a versão mais recente…</div>
<script>
// busca o número da versão sem cache e abre o app com ?v= -> garante conteúdo sempre atualizado
// preserva o #hash (deep link p/ município, ex.: #mun=520870)
fetch('build.txt',{cache:'no-store'}).then(r=>r.text()).then(v=>{
  location.replace('app.html?v='+encodeURIComponent(v.trim())+location.hash);
}).catch(()=>location.replace('app.html?v='+Date.now()+location.hash));
</script>
</body></html>
