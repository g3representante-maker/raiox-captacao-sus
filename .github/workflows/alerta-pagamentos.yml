name: alerta-pagamentos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11,14,17,20 * * 1-5"   # dias úteis: 08h, 11h, 14h, 17h BRT (4x/dia — pega movimentações rápido)

permissions:
  contents: write

concurrency:
  group: alerta-pagamentos
  cancel-in-progress: false

jobs:
  alerta:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preparar
        run: |
          mkdir -p ~/raiox/fontes
          cp pipeline/alerta_pagamentos.py ~/raiox/
          cp pipeline/fontes/* ~/raiox/fontes/
          cp pipeline/estado_pagamentos.json ~/raiox/estado_pagamentos.json

      - name: Detectar pagamentos
        id: det
        run: |
          cd ~/raiox
          out=$(python3 alerta_pagamentos.py); echo "$out"
          if echo "$out" | grep -q "TEM_NOVOS=1"; then echo "novos=1" >> "$GITHUB_OUTPUT"; else echo "novos=0" >> "$GITHUB_OUTPUT"; fi
          cp -f ~/raiox/estado_pagamentos.json "$GITHUB_WORKSPACE/pipeline/estado_pagamentos.json"
          [ -f ~/raiox/alerta_email.txt ] && cp ~/raiox/alerta_email.txt "$GITHUB_WORKSPACE/alerta_email.txt" || true

      - name: Enviar e-mail (só se houver novos pagamentos)
        if: steps.det.outputs.novos == '1'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[Raio-X SUS] Novos pagamentos de custeio MAC/PAP"
          to: g3.healthservice@proton.me
          from: Raio-X SUS G3 <${{ secrets.MAIL_USERNAME }}>
          body: file://alerta_email.txt

      - name: Salvar estado
        run: |
          git config user.name "raiox-bot"; git config user.email "actions@github.com"
          git add pipeline/estado_pagamentos.json
          git diff --cached --quiet || { git commit -m "Estado de pagamentos atualizado ($(date -u '+%Y-%m-%d %H:%M UTC'))"; git push; }
